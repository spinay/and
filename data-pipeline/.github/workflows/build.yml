name: Build IPO data

on:
  push:
    branches: [main]
    paths:
      - 'data-pipeline/seed/**'
      - 'data-pipeline/scripts/**'
      - 'data-pipeline/.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: data-pipeline

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install deps
        run: npm ci

      - name: Build JSON
        run: npm run build

      - name: Validate JSON
        run: npm run validate

      - name: Commit result
        run: |
          if git diff --quiet data/ipos.json; then
            echo "No JSON changes, skipping commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ipos.json
          git commit -m "build: update ipos.json [skip ci]"
          git push
